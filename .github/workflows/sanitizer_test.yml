name: ASAN and UBSAN Tests

on:
  push:
    branches:
      - '**'
      - '!dependabot/**'
    tags:
      - '**'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.repository }}-${{ github.head_ref || github.sha }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sanitizer-test:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    name: "ASAN and UBSAN Tests"
    runs-on: ubuntu-24.04
    env:
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
      SCCACHE_CACHE_SIZE: "2G"
    steps:
      - name: Checkout iceberg-cpp
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install dependencies
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev
      - name: Restore sccache cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/.sccache
          key: sccache-sanitizer-ubuntu-${{ github.run_id }}
          restore-keys: |
            sccache-sanitizer-ubuntu-
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Configure and Build with ASAN & UBSAN
        env:
          CC: gcc-14
          CXX: g++-14
        run: |
          mkdir build && cd build
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Debug -DICEBERG_ENABLE_ASAN=ON -DICEBERG_ENABLE_UBSAN=ON \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
          cmake --build . --verbose
      - name: Show sccache stats
        shell: bash
        run: sccache --show-stats
      - name: Save sccache cache
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/.sccache
          key: sccache-sanitizer-ubuntu-${{ github.run_id }}
      - name: Run Tests
        working-directory: build
        env:
          ASAN_OPTIONS: log_path=${{ github.workspace }}/asan.log:detect_leaks=1:symbolize=1:strict_string_checks=1:halt_on_error=1:detect_container_overflow=0
          LSAN_OPTIONS: suppressions=${{ github.workspace }}/.github/lsan-suppressions.txt
          UBSAN_OPTIONS: log_path=${{ github.workspace }}/ubsan.log:halt_on_error=1:print_stacktrace=1:suppressions=${{ github.workspace }}/.github/ubsan-suppressions.txt
        run: |
          ctest --output-on-failure
      - name: Save the test output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-output
          path: |
            asan.log*
            ubsan.log*
            build/Testing/Temporary/LastTest.log
            build/Testing/Temporary/LastTestsFailed.log
