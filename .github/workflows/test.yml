name: Test

on:
  push:
    branches:
      - '**'
      - '!dependabot/**'
    tags:
      - '**'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.repository }}-${{ github.head_ref || github.sha }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  ICEBERG_HOME: /tmp/iceberg

jobs:
  ubuntu:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    name: AMD64 Ubuntu 24.04
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
    steps:
      - name: Checkout iceberg-cpp
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install dependencies
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev
      - name: Build Iceberg
        shell: bash
        env:
          CC: gcc-14
          CXX: g++-14
        run: ci/scripts/build_iceberg.sh $(pwd) ON
      - name: Build Example
        shell: bash
        env:
          CC: gcc-14
          CXX: g++-14
        run: ci/scripts/build_example.sh $(pwd)/example
  macos:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    name: AArch64 macOS 26
    runs-on: macos-26
    timeout-minutes: 30
    strategy:
      fail-fast: false
    steps:
      - name: Checkout iceberg-cpp
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Build Iceberg
        shell: bash
        run: ci/scripts/build_iceberg.sh $(pwd)
      - name: Build Example
        shell: bash
        run: ci/scripts/build_example.sh $(pwd)/example
  windows:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    name: AMD64 Windows 2025
    runs-on: windows-2025
    timeout-minutes: 60
    strategy:
      fail-fast: false
    steps:
      - name: Checkout iceberg-cpp
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
        with:
          arch: x64
      - name: Install dependencies
        shell: pwsh
        run: |
          vcpkg install zlib:x64-windows nlohmann-json:x64-windows nanoarrow:x64-windows roaring:x64-windows cpr:x64-windows
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Build Iceberg
        shell: pwsh
        env:
          SCCACHE_GHA_ENABLED: "true"
        run: |
          $ErrorActionPreference = "Stop"
          bash -lc 'ci/scripts/build_iceberg.sh $(pwd) OFF ON'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          sccache --show-stats
      - name: Build Example
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          bash -lc 'ci/scripts/build_example.sh $(pwd)/example'
  meson:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    name: Meson - ${{ matrix.title }}
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 30
    strategy:
      max-parallel: 15
      fail-fast: false
      matrix:
        include:
          - title: AMD64 Ubuntu 24.04
            runs-on: ubuntu-24.04
            CC: gcc-14
            CXX: g++-14
            meson-setup-args: -Drest_integration_test=enabled
          - title: AMD64 Windows 2025
            runs-on: windows-2025
            meson-setup-args: --vsenv
          - title: AArch64 macOS 26
            runs-on: macos-26
    steps:
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'
      - name: Checkout iceberg-cpp
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install build dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt
      - name: Set Ubuntu Compilers
        if: ${{ startsWith(matrix.runs-on, 'ubuntu') }}
        run: |
          echo "CC=${{ matrix.CC }}" >> $GITHUB_ENV
          echo "CXX=${{ matrix.CXX }}" >> $GITHUB_ENV
      - name: Setup sccache
        if: ${{ startsWith(matrix.runs-on, 'windows') }}
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Enable sccache
        if: ${{ startsWith(matrix.runs-on, 'windows') }}
        shell: bash
        run: echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
      - name: Build Iceberg
        run: |
          meson setup builddir ${{ matrix.meson-setup-args || '' }}
          meson compile -C builddir
      - name: Show sccache stats
        if: ${{ startsWith(matrix.runs-on, 'windows') }}
        run: sccache --show-stats
      - name: Test Iceberg
        run: |
          meson test -C builddir --timeout-multiplier 0 --print-errorlogs
