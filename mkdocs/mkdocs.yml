site_name: Iceberg C++
site_description: C++ implementation of Apache Iceberg, an open table format for large analytic datasets
site_url: https://cpp.iceberg.apache.org/
repo_url: "https://github.com/apache/iceberg-cpp"
repo_name: "apache/iceberg-cpp"

theme:
  name: material
  logo: assets/iceberg-logo-icon.png
  favicon: assets/iceberg-logo-icon.png
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.instant
    - navigation.sections
    - content.code.copy
    - toc.integrate
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Contributing: contributing.md
  - Releases:
    - Release History: releases.md
    - Release Process: release-process.md
    - Verify a Release Candidate: verify-rc.md
  - API Documentation: api/index.html
  - SQL Catalog: sql-catalog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/apache/iceberg-cpp
    - icon: fontawesome/brands/slack
      link: https://apache-iceberg.slack.com/
